worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Gzip для JSON-ответов
    gzip on;
    gzip_types application/json text/plain;

    server {
        listen 80;
        server_name _;

        # Health check без авторизации
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # PostgREST API
        location /pg/ {
            proxy_pass         http://postgrest:3100/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # CORS — разрешить фронтенду
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer" always;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # pgAdmin
        location /pgadmin/ {
            proxy_pass         http://127.0.0.1:5050/pgadmin/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
            proxy_buffering    off;
        }

        # Фронтенд (Vue SPA) — раскомментировать когда будет готов
        # location / {
        #     root   /usr/share/nginx/html;
        #     try_files $uri $uri/ /index.html;
        # }
    }

    # HTTPS — раскомментировать когда будет домен и сертификат
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     location /pg/ {
    #         proxy_pass http://postgrest:3100/;
    #         ... (то же что выше)
    #     }
    # }
}
