services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-controlling}
      POSTGRES_USER:     ${POSTGRES_USER:-controlling_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d/sql:ro
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-controlling_user} -d ${POSTGRES_DB:-controlling}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v14.2.3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI:          postgres://${POSTGRES_USER:-controlling_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-controlling}
      PGRST_DB_SCHEMAS:      api
      PGRST_DB_ANON_ROLE:    anon
      PGRST_JWT_SECRET:      ${JWT_SECRET}
      PGRST_SERVER_PORT:     3100
      PGRST_LOG_LEVEL:       info
    ports:
      - "127.0.0.1:3100:3100"   # наружу не торчит — только через nginx

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - postgrest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro          # сюда кладёшь сертификаты
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s

volumes:
  postgres_data:
